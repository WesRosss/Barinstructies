<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Instructies - TPV Uitwijk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="https://storage.knltb.club/logos/425815f0-b74b-47a4-85b2-44a53ffbfb07.jpg" alt="Tennis- en padelvereniging Uitwijk" class="logo">
        </div>
        <div class="header-content">
            <h1>Bar Instructies</h1>
            <p class="subtitle">Tennis- en padelvereniging Uitwijk</p>
        </div>
        <div class="controls">
            <div class="search-container">
                <input type="text" id="search" placeholder="Zoek instructie..." autocomplete="off">
                <button id="search-clear" class="icon-btn" aria-label="Wissen">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="filter-container">
                <select id="hoofdcategorie-filter">
                    <option value="">Alle categorieën</option>
                </select>
            </div>
            <div class="filter-container">
                <select id="onderwerp-filter">
                    <option value="">Alle onderwerpen</option>
                </select>
            </div>

        </div>
    </header>
    
    <main>
        <div id="video-count" class="video-count"></div>
        <div id="videos-container" class="videos-container"></div>
        <div id="no-results" class="no-results hidden">
            <p>Geen video's gevonden</p>
        </div>
    </main>
    
    <div id="video-modal" class="modal hidden">
        <div class="modal-content">
            <button id="modal-close" class="icon-btn close-btn" aria-label="Sluiten">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
            <video id="modal-video" controls autoplay>
                <source src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <div id="modal-onderwerpen" class="modal-onderwerpen"></div>
            </div>
            <div id="modal-suggestions" class="modal-suggestions hidden">
                <h3>Misschien ook interessant</h3>
                <div id="suggestions-container" class="suggestions-container"></div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
