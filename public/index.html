<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Instructies - TPV Uitwijk</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#003399">
    <meta name="background-color" content="#003399">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bar Instructies">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.webmanifest">
    
    <!-- iOS Icons (SVG based) -->
    <link rel="apple-touch-icon" href="/favicon.svg">
    
    <link rel="stylesheet" href="style.css">
    
    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
        
        // Check if app is installed as PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Show install button
            const installBtn = document.getElementById('install-btn');
            if (installBtn) {
                installBtn.style.display = 'block';
            }
        });
        
        // Install PWA
        async function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                } else {
                    console.log('User dismissed the install prompt');
                }
                deferredPrompt = null;
            }
        }
    </script>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="https://storage.knltb.club/logos/425815f0-b74b-47a4-85b2-44a53ffbfb07.jpg" alt="Tennis- en padelvereniging Uitwijk" class="logo">
        </div>
        <div class="header-content">
            <h1>Bar Instructies</h1>
            <p class="subtitle">Tennis- en padelvereniging Uitwijk</p>
        </div>
        <div class="controls">
            <div class="search-container">
                <input type="text" id="search" placeholder="Zoek instructie..." autocomplete="off">
                <button id="search-clear" class="icon-btn" aria-label="Wissen">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="filter-container">
                <select id="hoofdcategorie-filter">
                    <option value="">Alle categorieën</option>
                </select>
            </div>
            <div class="filter-container">
                <select id="onderwerp-filter">
                    <option value="">Alle onderwerpen</option>
                </select>
            </div>
            <button id="install-btn" class="install-btn hidden" onclick="installPWA()" aria-label="Installeer als app">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <span>Installeer</span>
            </button>
        </div>
    </header>
    
    <main>
        <div id="video-count" class="video-count"></div>
        <div id="videos-container" class="videos-container"></div>
        <div id="no-results" class="no-results hidden">
            <p>Geen video's gevonden</p>
        </div>
    </main>
    
    <div id="video-modal" class="modal hidden">
        <div class="modal-content">
            <button id="modal-close" class="icon-btn close-btn" aria-label="Sluiten">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
            <video id="modal-video" controls autoplay>
                <source src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <div id="modal-onderwerpen" class="modal-onderwerpen"></div>
            </div>
            <div id="modal-suggestions" class="modal-suggestions hidden">
                <h3>Misschien ook interessant</h3>
                <div id="suggestions-container" class="suggestions-container"></div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
